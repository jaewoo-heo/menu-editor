name: Supabase Keep-Alive

# 5일마다 자동 실행 (UTC 기준 월요일·목요일 오전 9시 = KST 오후 6시)
# → 7일 비활성 일시정지 정책을 우회
on:
  schedule:
    - cron: '0 0 */5 * *'   # 매 5일마다 UTC 자정
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/menu_state?select=id&limit=1")
          echo "Supabase HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "406" ]; then
            echo "✅ Supabase 활성 상태 확인 완료"
          else
            echo "⚠️ 응답 코드 $STATUS — 프로젝트가 일시정지 상태일 수 있습니다."
            exit 1
          fi
